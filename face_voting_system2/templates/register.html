<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Voter - Face Recognition Voting System</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(-45deg, #667eea, #764ba2, #f093fb, #f5576c);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .registration-container {
            width: 100%;
            max-width: 500px;
            animation: slideIn 0.8s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 25px;
            padding: 50px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .card-header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .card-icon {
            font-size: 3em;
            margin-bottom: 15px;
            display: block;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .card-title {
            font-size: 1.8em;
            font-weight: 700;
            color: #333;
            margin-bottom: 8px;
        }

        .card-subtitle {
            font-size: 0.95em;
            color: #888;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.95em;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 0.95em;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
            background: #f8f8f8;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group input::placeholder {
            color: #999;
        }

        .video-container {
            margin: 30px 0;
            text-align: center;
            position: relative;
            border-radius: 15px;
            overflow: hidden;
            background: #f0f0f0;
            border: 2px dashed #ddd;
        }

        video {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 12px;
            background: #000;
        }

        .camera-status {
            padding: 15px;
            text-align: center;
            font-size: 0.9em;
            color: #666;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            margin: 20px 0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            animation: none;
            transition: width 0.3s ease;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 14px 24px;
            border: none;
            border-radius: 12px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-capture {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-capture:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(102, 126, 234, 0.4);
        }

        .btn-capture:active {
            transform: translateY(0);
        }

        .btn-back {
            background: #f0f0f0;
            color: #333;
            border: 2px solid #e0e0e0;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }

        .btn-back:hover {
            background: #e8e8e8;
            border-color: #d0d0d0;
        }

        .info-message {
            background: rgba(102, 126, 234, 0.1);
            border-left: 4px solid #667eea;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.9em;
            color: #333;
            margin-bottom: 20px;
        }

        #canvas {
            display: none;
        }

        @media (max-width: 600px) {
            .card {
                padding: 35px 25px;
            }

            .card-title {
                font-size: 1.5em;
            }

            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <div class="registration-container">
        <div class="card">
            <div class="card-header">
                <span class="card-icon">📸</span>
                <h1 class="card-title">Register Your Face</h1>
                <p class="card-subtitle">Join the democratic voting system</p>
            </div>

            <div class="info-message">
                ✓ Your biometric data is secure and encrypted
            </div>

            <form>
                <div class="form-group">
                    <label for="name">Full Name *</label>
                    <input type="text" id="name" placeholder="Enter your full name" required autocomplete="name">
                </div>

                <div class="form-group">
                    <label for="phone">Mobile Number *</label>
                    <input type="tel" id="phone" placeholder="10-digit mobile number" pattern="[0-9]{10}" required autocomplete="tel">
                </div>

                <div class="form-group">
                    <label for="aadhaar">Aadhaar Number *</label>
                    <input type="text" id="aadhaar" placeholder="12-digit Aadhaar number" pattern="[0-9]{12}" required autocomplete="off">
                </div>

                <div class="form-group">
                    <label>Capture Your Face *</label>
                    <div class="video-container">
                        <video id="video" autoplay playsinline></video>
                        <div class="camera-status">📷 Camera Active</div>
                    </div>
                </div>

                <div class="progress-bar">
                    <div class="progress-fill"></div>
                </div>

                <div class="button-group">
                    <button type="button" class="btn-capture" onclick="capture()">📸 Capture & Register</button>
                    <a href="/" style="text-decoration: none;">
                        <button type="button" class="btn-back">⬅ Back</button>
                    </a>
                </div>
            </form>
        </div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const video = document.getElementById('video');
        const progressFill = document.querySelector('.progress-fill');

        navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } } 
        })
        .then(stream => {
            video.srcObject = stream;
        })
        .catch(err => {
            alert('❌ Camera access denied. Please allow camera permissions.');
            console.error(err);
        });

        function capture() {
            let name = document.getElementById('name').value.trim();
            let phone = document.getElementById('phone').value.trim();
            let aadhaar = document.getElementById('aadhaar').value.trim();

            if (!name || !phone || !aadhaar) {
                alert("❌ All fields are required");
                return;
            }

            if (!/^[0-9]{10}$/.test(phone)) {
                alert("❌ Enter valid 10-digit mobile number");
                return;
            }

            if (!/^[0-9]{12}$/.test(aadhaar)) {
                alert("❌ Enter valid 12-digit Aadhaar number");
                return;
            }

            progressFill.style.width = '30%';

            const canvas = document.getElementById('canvas');
            const context = canvas.getContext('2d');

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0);

            const image = canvas.toDataURL('image/jpeg');

            progressFill.style.width = '70%';

            fetch('/save_face', {
                method: 'POST',
                body: JSON.stringify({
                    name: name,
                    phone: phone,
                    aadhaar: aadhaar,
                    image: image
                }),
                headers: {
                    'Content-Type': 'application/json'
                }
            })
            .then(res => res.text())
            .then(data => {
                progressFill.style.width = '100%';
                alert(data);
                if (data.includes('Successfully')) {
                    setTimeout(() => window.location.href = '/', 1500);
                }
                progressFill.style.width = '0%';
            })
            .catch(err => {
                progressFill.style.width = '0%';
                alert('❌ Registration failed: ' + err);
            });
        }
    </script>
</body>
</html>
